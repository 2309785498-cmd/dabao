name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: output/rn-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate iOS project
        run: npx expo prebuild -p ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build archive
        run: |
          cd ios
          xcodebuild archive \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -archivePath ../ios.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            > /tmp/xcodebuild.log 2>&1
          BUILD_EXIT=$?
          echo "=== ERRORS & WARNINGS ==="
          grep -E "error:|warning:" /tmp/xcodebuild.log | head -100 || echo "(none)"
          echo "=== LAST 30 LINES ==="
          tail -30 /tmp/xcodebuild.log
          echo "=== BUILD RESULT ==="
          echo "xcodebuild exit code: $BUILD_EXIT"
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "BUILD FAILED"
            exit 1
          fi
          echo "BUILD SUCCEEDED"
          ls -la ../ios.xcarchive/Products/Applications/

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r ios.xcarchive/Products/Applications/*.app Payload/
          zip -r mobile-office-assistant.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output/rn-app/mobile-office-assistant.ipa
