name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: output/rn-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate iOS project
        run: npx expo prebuild -p ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS app
        run: |
          cd ios
          xcodebuild build \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            2>&1 | tee ../build.log | grep -vE "(^Compile|^Libtool|^Ld |^Generate|^CpResource|^Phase|^Process|^Scan|^Touch|^Register)" || true
          echo "=== LAST 30 LINES ==="
          tail -30 ../build.log
          if ! grep -q "BUILD SUCCEEDED" ../build.log; then
            echo "BUILD FAILED"
            exit 1
          fi
          echo "BUILD SUCCEEDED"

      - name: Package IPA
        run: |
          APP=$(find "/Users/runner/Library/Developer/Xcode/DerivedData" -path "*/Release-iphoneos/*.app" -type d -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "Cannot find .app"
            exit 1
          fi
          echo "Found: $APP"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r mobile-office-assistant.ipa Payload
          echo "IPA: $(ls -lh mobile-office-assistant.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output/rn-app/mobile-office-assistant.ipa
