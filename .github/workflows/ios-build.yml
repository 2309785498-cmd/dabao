name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: output/rn-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate iOS project
        run: npx expo prebuild -p ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Debug - list generated files
        run: |
          echo "=== iOS directory ==="
          ls -la ios/
          echo "=== Schemes ==="
          cd ios
          xcodebuild -list 2>&1 || true

      - name: Build archive
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name '*.xcworkspace' | head -1)
          echo "Workspace: $WORKSPACE"
          SCHEMES=$(xcodebuild -list -workspace "$WORKSPACE" 2>&1)
          echo "Available schemes:"
          echo "$SCHEMES"
          SCHEME=$(echo "$SCHEMES" | sed -n '/Schemes:/,/^$/s/^[[:space:]]*//p' | head -1)
          echo "Using scheme: $SCHEME"
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath ../ios.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r ios.xcarchive/Products/Applications/*.app Payload/
          zip -r mobile-office-assistant.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output/rn-app/mobile-office-assistant.ipa
