name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: output/rn-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate iOS project
        run: npx expo prebuild -p ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Disable code signing
        run: |
          cd ios
          /usr/libexec/PlistBuddy -c "Set :objects:13B07F941A680F5B00A75B9A:buildSettings:CODE_SIGN_STYLE Manual" app.xcodeproj/project.pbxproj 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :objects:13B07F941A680F5B00A75B9A:buildSettings:CODE_SIGN_IDENTITY ''" app.xcodeproj/project.pbxproj 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :objects:13B07F941A680F5B00A75B9A:buildSettings:PROVISIONING_PROFILE_SPECIFIER ''" app.xcodeproj/project.pbxproj 2>/dev/null || true
          echo "Signing disabled"

      - name: Build iOS app
        run: |
          cd ios
          xcodebuild build \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          APP=$(find "/Users/runner/Library/Developer/Xcode/DerivedData" -path "*/Release-iphoneos/*.app" -type d -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "Cannot find .app"
            exit 1
          fi
          echo "Found: $APP"
          mkdir -p ../ios-build
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r ../ios-build/mobile-office-assistant.ipa Payload
          echo "IPA: $(ls -lh ../ios-build/mobile-office-assistant.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output/ios-build/mobile-office-assistant.ipa
