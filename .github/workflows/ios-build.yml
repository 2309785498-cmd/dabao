name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: output/rn-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: output/rn-app/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('output/rn-app/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Clean previous build
        run: |
          rm -rf ios/
          rm -rf ../ios-build/Payload ../ios-build/mobile-office-assistant.ipa

      - name: Generate iOS project
        run: npx expo prebuild -p ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Get scheme name
        id: scheme
        run: |
          cd ios
          SCHEME=$(xcodebuild -list -workspace *.xcworkspace | awk '/Schemes:/{flag=1; next} flag && NF && !/^$/{print $1; exit}')
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Build archive (unsigned)
        run: |
          cd ios
          xcodebuild archive \
            -workspace *.xcworkspace \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -configuration Release \
            -archivePath ../ios.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find ios.xcarchive/Products/Applications -name "*.app" -type d)
          mkdir -p ../ios-build
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r ../ios-build/mobile-office-assistant.ipa Payload
          echo "IPA: $(ls -lh ../ios-build/mobile-office-assistant.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: output/ios-build/mobile-office-assistant.ipa
